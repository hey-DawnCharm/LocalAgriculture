<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>农药稀释倍数计算器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2E7D32',
                        secondary: '#E8F5E9',
                        accent: '#1B5E20'
                    }
                }
            }
        }
    </script>
    <style>
        input:focus, select:focus {
            outline: none;
            border-color: #2E7D32;
            box-shadow: 0 0 0 2px rgba(46, 125, 50, 0.2);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">
    <div class="max-w-3xl mx-auto px-4 py-5 md:py-8">
        <!-- 页面标题 -->
        <h1 class="text-2xl md:text-3xl font-bold text-center text-primary mb-6">
            农药稀释倍数计算器
        </h1>
        <p class="text-center text-gray-500 text-sm mb-6">本地人农资服务站</p>

        <!-- 主标签页容器 -->
        <div class="bg-white rounded-xl shadow-sm mb-5 overflow-hidden">
            <!-- 主标签头部 -->
            <div class="flex border-b border-gray-200">
                <button data-tab="1" class="main-tab flex-1 py-3 px-2 text-center font-medium text-primary border-b-2 border-primary transition-colors">
                    兑水量算药量
                </button>
                <button data-tab="2" class="main-tab flex-1 py-3 px-2 text-center font-medium text-gray-600 hover:text-primary transition-colors">
                    用药量算水量
                </button>
                <button data-tab="3" class="main-tab flex-1 py-3 px-2 text-center font-medium text-gray-600 hover:text-primary transition-colors">
                    浓度转倍数算药量
                </button>
            </div>

            <!-- 模块1：兑水量 → 算用药量 -->
            <div id="tab-content-1" class="tab-content p-4 md:p-5">
                <div class="space-y-4">
                    <!-- 兑水量输入 -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">兑水量</label>
                        <div class="flex gap-2">
                            <input 
                                type="number" 
                                id="water-1" 
                                value="30" 
                                min="0" 
                                step="0.1"
                                class="flex-1 px-3 py-2.5 border border-gray-300 rounded-lg text-base"
                            >
                            <select id="water-unit-1" class="w-20 px-2 border border-gray-300 rounded-lg text-base bg-white">
                                <option value="jin">斤</option>
                                <option value="liter">升</option>
                                <option value="kg">千克</option>
                                <option value="ton">吨</option>
                                <option value="g">克</option>
                                <option value="ml">毫升</option>
                            </select>
                        </div>
                    </div>

                    <!-- 水量快捷按钮 -->
                    <div class="flex flex-wrap gap-2">
                        <button onclick="setWaterQuick(15, 'liter')" class="px-3 py-1.5 bg-gray-100 rounded-md text-sm hover:bg-primary hover:text-white transition-colors">15L</button>
                        <button onclick="setWaterQuick(20, 'liter')" class="px-3 py-1.5 bg-gray-100 rounded-md text-sm hover:bg-primary hover:text-white transition-colors">20L</button>
                        <button onclick="setWaterQuick(25, 'liter')" class="px-3 py-1.5 bg-gray-100 rounded-md text-sm hover:bg-primary hover:text-white transition-colors">25L</button>
                        <button onclick="setWaterQuick(30, 'jin')" class="px-3 py-1.5 bg-gray-100 rounded-md text-sm hover:bg-primary hover:text-white transition-colors">30斤</button>
                        <button onclick="setWaterQuick(40, 'jin')" class="px-3 py-1.5 bg-gray-100 rounded-md text-sm hover:bg-primary hover:text-white transition-colors">40斤</button>
                    </div>

                    <!-- 稀释倍数输入 -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">稀释倍数</label>
                        <input 
                            type="number" 
                            id="ratio-1" 
                            min="1" 
                            value="1000"
                            class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-base"
                        >
                    </div>

                    <!-- 倍数快捷按钮 -->
                    <div class="flex flex-wrap gap-2">
                        <button onclick="setRatioQuick(500)" class="px-3 py-1.5 bg-gray-100 rounded-md text-sm hover:bg-primary hover:text-white transition-colors">500倍</button>
                        <button onclick="setRatioQuick(1000)" class="px-3 py-1.5 bg-gray-100 rounded-md text-sm hover:bg-primary hover:text-white transition-colors">1000倍</button>
                        <button onclick="setRatioQuick(1500)" class="px-3 py-1.5 bg-gray-100 rounded-md text-sm hover:bg-primary hover:text-white transition-colors">1500倍</button>
                        <button onclick="setRatioQuick(2000)" class="px-3 py-1.5 bg-gray-100 rounded-md text-sm hover:bg-primary hover:text-white transition-colors">2000倍</button>
                        <button onclick="setRatioQuick(3000)" class="px-3 py-1.5 bg-gray-100 rounded-md text-sm hover:bg-primary hover:text-white transition-colors">3000倍</button>
                    </div>

                    <!-- 结果展示 -->
                    <div class="bg-secondary p-5 rounded-lg text-center mt-5">
                        <p class="text-xl md:text-2xl font-bold text-accent">
                            需加药量：<span id="result-1">0.00</span> 克/毫升
                        </p>
                    </div>
                </div>
            </div>

            <!-- 模块2：用药量 → 算兑水量 -->
            <div id="tab-content-2" class="tab-content p-4 md:p-5 hidden">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">用药量（克/毫升）</label>
                        <input 
                            type="number" 
                            id="pesticide-2" 
                            min="0" 
                            step="0.1" 
                            value="20"
                            class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-base"
                        >
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">稀释倍数</label>
                        <input 
                            type="number" 
                            id="ratio-2" 
                            min="1" 
                            value="1000"
                            class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-base"
                        >
                    </div>

                    <!-- 结果展示 -->
                    <div class="bg-secondary p-5 rounded-lg text-center mt-5">
                        <p class="text-xl md:text-2xl font-bold text-accent">
                            需兑水量：<span id="result-2-liter">0.00</span> 升 / <span id="result-2-jin">0.00</span> 斤
                        </p>
                        <p id="result-2-tip" class="text-sm text-gray-600 mt-2">常规浓度计算模式</p>
                    </div>
                </div>
            </div>

            <!-- 模块3：浓度转稀释倍数并计算用药量 -->
            <div id="tab-content-3" class="tab-content p-4 md:p-5 hidden">
                <!-- 子标签 -->
                <div class="flex border-b border-gray-200 mb-4">
                    <button data-subtab="1" class="sub-tab flex-1 py-2 text-center font-medium text-primary border-b-2 border-primary transition-colors">
                        百分比换算
                    </button>
                    <button data-subtab="2" class="sub-tab flex-1 py-2 text-center font-medium text-gray-600 hover:text-primary transition-colors">
                        ppm换算
                    </button>
                </div>

                <!-- 百分比换算子页 -->
                <div id="subtab-content-1" class="sub-tab-content space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">原药有效成分百分比（%）</label>
                        <input 
                            type="number" 
                            id="percent-original" 
                            step="0.1" 
                            value="25"
                            class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-base"
                        >
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">目标使用浓度百分比（%）</label>
                        <input 
                            type="number" 
                            id="percent-target" 
                            step="0.001" 
                            value="0.05"
                            class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-base"
                        >
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">总兑水量</label>
                        <div class="flex gap-2">
                            <input 
                                type="number" 
                                id="water-3-percent" 
                                value="30" 
                                min="0" 
                                step="0.1"
                                class="flex-1 px-3 py-2.5 border border-gray-300 rounded-lg text-base"
                            >
                            <select id="water-unit-3-percent" class="w-20 px-2 border border-gray-300 rounded-lg text-base bg-white">
                                <option value="jin">斤</option>
                                <option value="liter">升</option>
                                <option value="kg">千克</option>
                                <option value="ton">吨</option>
                                <option value="g">克</option>
                                <option value="ml">毫升</option>
                            </select>
                        </div>
                    </div>

                    <!-- 结果 -->
                    <div class="bg-secondary p-5 rounded-lg text-center mt-3">
                        <p class="text-lg font-bold text-accent mb-1">
                            稀释倍数：<span id="result-3-ratio-percent">0</span> 倍
                        </p>
                        <p class="text-xl font-bold text-accent">
                            需加药量：<span id="result-3-dose-percent">0.00</span> 克/毫升
                        </p>
                    </div>
                </div>

                <!-- ppm换算子页 -->
                <div id="subtab-content-2" class="sub-tab-content space-y-4 hidden">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">原药有效成分百分比（%）</label>
                        <input 
                            type="number" 
                            id="ppm-original" 
                            step="0.1" 
                            value="1.8"
                            class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-base"
                        >
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">目标使用浓度（ppm）</label>
                        <input 
                            type="number" 
                            id="ppm-target" 
                            min="1" 
                            value="9"
                            class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-base"
                        >
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">总兑水量</label>
                        <div class="flex gap-2">
                            <input 
                                type="number" 
                                id="water-3-ppm" 
                                value="30" 
                                min="0" 
                                step="0.1"
                                class="flex-1 px-3 py-2.5 border border-gray-300 rounded-lg text-base"
                            >
                            <select id="water-unit-3-ppm" class="w-20 px-2 border border-gray-300 rounded-lg text-base bg-white">
                                <option value="jin">斤</option>
                                <option value="liter">升</option>
                                <option value="kg">千克</option>
                                <option value="ton">吨</option>
                                <option value="g">克</option>
                                <option value="ml">毫升</option>
                            </select>
                        </div>
                    </div>

                    <!-- 结果 -->
                    <div class="bg-secondary p-5 rounded-lg text-center mt-3">
                        <p class="text-lg font-bold text-accent mb-1">
                            稀释倍数：<span id="result-3-ratio-ppm">0</span> 倍
                        </p>
                        <p class="text-xl font-bold text-accent">
                            需加药量：<span id="result-3-dose-ppm">0.00</span> 克/毫升
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 15L喷雾器速查表（可折叠） -->
        <div class="bg-white rounded-xl shadow-sm mb-5 overflow-hidden">
            <button 
                id="table-toggle"
                class="w-full p-4 text-left font-medium text-primary flex justify-between items-center hover:bg-gray-50 transition-colors"
            >
                15L喷雾器常用配比速查表
                <span id="table-arrow" class="transition-transform">▼</span>
            </button>
            <div id="table-content" class="hidden border-t border-gray-100 p-4">
                <div class="grid grid-cols-2 sm:grid-cols-5 gap-2 text-center text-sm">
                    <div class="p-2 bg-gray-50 rounded-md">500倍 → 30ml</div>
                    <div class="p-2 bg-gray-50 rounded-md">1000倍 → 15ml</div>
                    <div class="p-2 bg-gray-50 rounded-md">1500倍 → 10ml</div>
                    <div class="p-2 bg-gray-50 rounded-md">2000倍 → 7.5ml</div>
                    <div class="p-2 bg-gray-50 rounded-md">3000倍 → 5ml</div>
                </div>
            </div>
        </div>

        <!-- 注意事项 -->
        <div class="bg-white rounded-xl shadow-sm p-4 md:p-5">
            <h3 class="font-medium text-primary mb-3">注意事项</h3>
            <ul class="text-sm text-gray-600 space-y-1.5 list-disc pl-5">
                <li>常规农药密度接近水，1克≈1毫升，可通用</li>
                <li>包装标注的稀释倍数已按制剂计算，直接使用即可</li>
                <li>高浓度配药建议采用二次稀释法，药液更均匀</li>
                <li>浓度换算请以有效成分含量为准，勿用制剂重量直接计算</li>
            </ul>
        </div>
    </div>

    <script>
        // 单位统一换算为毫升（基于1克≈1毫升的农药通用近似）
        function toMilliliter(value, unit) {
            const num = parseFloat(value) || 0;
            const unitMap = {
                ton: 1000000,
                kg: 1000,
                jin: 500,
                liter: 1000,
                g: 1,
                ml: 1
            };
            return num * (unitMap[unit] || 1);
        }

        // 主标签页切换逻辑
        const mainTabs = document.querySelectorAll('.main-tab');
        const tabContents = document.querySelectorAll('.tab-content');
        mainTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const index = tab.dataset.tab;
                mainTabs.forEach(t => {
                    t.classList.remove('text-primary', 'border-primary', 'border-b-2');
                    t.classList.add('text-gray-600');
                });
                tab.classList.add('text-primary', 'border-primary', 'border-b-2');
                tab.classList.remove('text-gray-600');
                tabContents.forEach(c => c.classList.add('hidden'));
                document.getElementById(`tab-content-${index}`).classList.remove('hidden');
            });
        });

        // 模块3子标签切换
        const subTabs = document.querySelectorAll('.sub-tab');
        const subTabContents = document.querySelectorAll('.sub-tab-content');
        subTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const index = tab.dataset.subtab;
                subTabs.forEach(t => {
                    t.classList.remove('text-primary', 'border-primary', 'border-b-2');
                    t.classList.add('text-gray-600');
                });
                tab.classList.add('text-primary', 'border-primary', 'border-b-2');
                tab.classList.remove('text-gray-600');
                subTabContents.forEach(c => c.classList.add('hidden'));
                document.getElementById(`subtab-content-${index}`).classList.remove('hidden');
                calcModule3();
            });
        });

        // 快捷按钮功能
        function setWaterQuick(value, unit) {
            document.getElementById('water-1').value = value;
            document.getElementById('water-unit-1').value = unit;
            calcModule1();
        }
        function setRatioQuick(value) {
            document.getElementById('ratio-1').value = value;
            calcModule1();
        }

        // 速查表折叠功能
        document.getElementById('table-toggle').addEventListener('click', () => {
            const content = document.getElementById('table-content');
            const arrow = document.getElementById('table-arrow');
            content.classList.toggle('hidden');
            arrow.style.transform = content.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(180deg)';
        });

        // 模块1计算：兑水量 → 用药量
        function calcModule1() {
            const waterMl = toMilliliter(
                document.getElementById('water-1').value,
                document.getElementById('water-unit-1').value
            );
            const ratio = parseInt(document.getElementById('ratio-1').value) || 1;
            const dose = (waterMl / ratio).toFixed(2);
            document.getElementById('result-1').textContent = dose;
        }

        // 模块2计算：用药量 → 兑水量
        function calcModule2() {
            const pesticide = parseFloat(document.getElementById('pesticide-2').value) || 0;
            const ratio = parseInt(document.getElementById('ratio-2').value) || 1;
            
            let waterMl, tip;
            if (ratio > 100) {
                waterMl = pesticide * ratio;
                tip = '常规浓度计算模式';
            } else {
                waterMl = pesticide * (ratio - 1);
                tip = '高浓度计算模式（已扣除药剂体积）';
            }
            
            document.getElementById('result-2-liter').textContent = (waterMl / 1000).toFixed(2);
            document.getElementById('result-2-jin').textContent = (waterMl / 500).toFixed(2);
            document.getElementById('result-2-tip').textContent = tip;
        }

        // 模块3计算：浓度转倍数 + 算用药量
        function calcModule3() {
            // 百分比换算
            const origPercent = parseFloat(document.getElementById('percent-original').value) || 0;
            const targetPercent = parseFloat(document.getElementById('percent-target').value) || 0.0001;
            const ratioPercent = Math.round(origPercent / targetPercent) || 0;
            const waterPercentMl = toMilliliter(
                document.getElementById('water-3-percent').value,
                document.getElementById('water-unit-3-percent').value
            );
            const dosePercent = ratioPercent > 0 ? (waterPercentMl / ratioPercent).toFixed(2) : '0.00';
            
            document.getElementById('result-3-ratio-percent').textContent = ratioPercent;
            document.getElementById('result-3-dose-percent').textContent = dosePercent;

            // ppm换算
            const origPpm = parseFloat(document.getElementById('ppm-original').value) || 0;
            const targetPpm = parseInt(document.getElementById('ppm-target').value) || 1;
            const ratioPpm = Math.round((origPpm * 10000) / targetPpm) || 0;
            const waterPpmMl = toMilliliter(
                document.getElementById('water-3-ppm').value,
                document.getElementById('water-unit-3-ppm').value
            );
            const dosePpm = ratioPpm > 0 ? (waterPpmMl / ratioPpm).toFixed(2) : '0.00';
            
            document.getElementById('result-3-ratio-ppm').textContent = ratioPpm;
            document.getElementById('result-3-dose-ppm').textContent = dosePpm;
        }

        // 绑定实时计算事件
        // 模块1
        document.getElementById('water-1').addEventListener('input', calcModule1);
        document.getElementById('water-unit-1').addEventListener('change', calcModule1);
        document.getElementById('ratio-1').addEventListener('input', calcModule1);

        // 模块2
        document.getElementById('pesticide-2').addEventListener('input', calcModule2);
        document.getElementById('ratio-2').addEventListener('input', calcModule2);

        // 模块3-百分比
        document.getElementById('percent-original').addEventListener('input', calcModule3);
        document.getElementById('percent-target').addEventListener('input', calcModule3);
        document.getElementById('water-3-percent').addEventListener('input', calcModule3);
        document.getElementById('water-unit-3-percent').addEventListener('change', calcModule3);

        // 模块3-ppm
        document.getElementById('ppm-original').addEventListener('input', calcModule3);
        document.getElementById('ppm-target').addEventListener('input', calcModule3);
        document.getElementById('water-3-ppm').addEventListener('input', calcModule3);
        document.getElementById('water-unit-3-ppm').addEventListener('change', calcModule3);

        // 页面加载初始化
        window.addEventListener('load', () => {
            calcModule1();
            calcModule2();
            calcModule3();
        });
    </script>
</body>
</html>
